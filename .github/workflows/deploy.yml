name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

# Allow the GITHUB_TOKEN to write to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-progress if a new push lands
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          # Telemetry — set as repo secrets if you want production telemetry.
          # Game runs fine without them (no-op telemetry).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
